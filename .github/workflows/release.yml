name: Release CI

permissions:
  contents: write

on:
  push:
    tags:
      - "*"
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Update apt
        run: sudo apt-get update

      - name: Install Linux packaging tools
        run: sudo apt-get install -y libarchive-tools rpm zip

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24.12.0
          cache: npm

      - run: npm install
      - run: npm run lint
      - run: npm run compile

  build_on_linux:
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - name: Update apt
        run: sudo apt-get update

      - name: Install Linux packaging tools
        run: sudo apt-get install -y libarchive-tools rpm zip

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24.12.0
          cache: npm

      - run: npm install

      - name: Build Linux packages
        run: npm run build

      - name: Build unpacked and zip it
        run: |
          npm run build-unpacked
          cd dist/linux-unpacked
          zip -r ../tidal-hifi-unpacked-linux.zip .
          cd ../..

      - uses: actions/upload-artifact@v4
        with:
          name: linux-builds
          path: |
            dist/*.deb
            dist/*.rpm
            dist/*.pacman
            dist/*.tar.gz
            dist/*.zip
            dist/*.AppImage
            dist/*.freebsd
          if-no-files-found: warn

  build_on_mac:
    needs: quality
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24.12.0
          cache: npm

      - run: npm install

      - name: Build macOS package
        run: npm run build-mac

      - name: Zip the .app bundle
        run: |
          if [ -d "dist/mac-arm64/tidal-hifi.app" ]; then
            cd dist/mac-arm64
            ditto -c -k --sequesterRsrc --keepParent tidal-hifi.app ../tidal-hifi-mac-arm64-app.zip
            cd ../..
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: mac-builds
          path: |
            dist/*.dmg
            dist/*.zip
            dist/tidal-hifi-mac-arm64-app.zip
          if-no-files-found: warn

  build_on_windows:
    needs: quality
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24.12.0
          cache: npm

      - run: npm install

      - name: Build Windows package
        run: npm run build-win

      - uses: actions/upload-artifact@v4
        with:
          name: windows-builds
          path: |
            dist/*.msi
            dist/*.exe
          if-no-files-found: warn

  create_release:
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - build_on_linux
      - build_on_mac
      - build_on_windows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: List artifacts
        run: find artifacts/ -type f | head -50

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: |
            artifacts/linux-builds/*.deb
            artifacts/linux-builds/*.rpm
            artifacts/linux-builds/*.pacman
            artifacts/linux-builds/*.AppImage
            artifacts/mac-builds/*.dmg
            artifacts/windows-builds/*.msi
          commit_message: Update tidal-hifi-git to ${{ github.ref_name }}
          ssh_keyscan_types: rsa,ecdsa,ed25519
